<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doga's Order</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf9f6;
    --surface: #ffffff;
    --surface2: #f5f3ee;
    --border: #e8e4dc;
    --accent: #F5C518;
    --accent2: #e0b310;
    --red: #D42B2B;
    --text: #1a1a1a;
    --muted: #999;
    --warn: #D42B2B;
    --radius: 12px;
    --shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  [data-theme="dark"] {
    --bg: #111111;
    --surface: #1c1c1c;
    --surface2: #252525;
    --border: #333;
    --text: #f0f0f0;
    --muted: #777;
    --shadow: none;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 120px;
  }

  header {
    background: var(--surface);
    border-bottom: 3px solid var(--accent);
    padding: 16px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    color: var(--red);
    letter-spacing: -0.5px;
  }

  .logo span {
    color: var(--text);
    opacity: 0.4;
    font-weight: 700;
  }

  .lang-toggle {
    display: flex;
    background: var(--surface2);
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .lang-btn {
    padding: 6px 12px;
    font-size: 0.75rem;
    font-weight: 600;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .lang-btn.active {
    background: var(--accent);
    color: #111;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .cart-count {
    background: var(--accent);
    color: #111;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    padding: 4px 10px;
    border-radius: 20px;
    min-width: 36px;
    text-align: center;
  }

  .search-wrap {
    padding: 14px 20px 0;
  }

  .search-input {
    width: 100%;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input:focus {
    border-color: var(--accent);
  }

  .search-input::placeholder {
    color: var(--muted);
  }

  .category-nav {
    display: flex;
    gap: 8px;
    padding: 14px 20px;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .category-nav::-webkit-scrollbar { display: none; }

  .cat-pill {
    white-space: nowrap;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .cat-pill.active {
    background: var(--accent);
    color: #111;
    border-color: var(--accent);
  }

  .section {
    padding: 0 20px 20px;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    padding: 18px 0 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .section-icon {
    font-size: 1rem;
  }

  .product-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  @media (min-width: 500px) {
    .product-grid { grid-template-columns: 1fr 1fr 1fr; }
  }

  .product-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .product-card.has-qty {
    border-color: var(--accent);
    background: #fffbea;
  }

  [data-theme="dark"] .product-card.has-qty {
    background: #1f1a00;
  }

  .product-name {
    font-size: 0.82rem;
    font-weight: 500;
    line-height: 1.3;
    color: var(--text);
    flex: 1;
  }

  .product-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    background: var(--surface2);
    padding: 2px 6px;
    border-radius: 4px;
    display: inline-block;
    width: fit-content;
  }

  .qty-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 2px;
  }

  .qty-btn {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
    font-family: 'DM Mono', monospace;
  }

  .qty-btn:hover {
    background: var(--accent);
    color: #111;
    border-color: var(--accent);
  }

  .qty-input {
    width: 36px;
    text-align: center;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.95rem;
    font-weight: 500;
    outline: none;
  }

  /* Remove arrows from number input */
  .qty-input::-webkit-outer-spin-button,
  .qty-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .qty-input[type=number] { -moz-appearance: textfield; }

  .qty-badge {
    position: absolute;
    top: -6px;
    right: -6px;
    width: 20px;
    height: 20px;
    background: var(--accent);
    color: #111;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    font-weight: 700;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Bottom bar */
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    gap: 10px;
    align-items: center;
    z-index: 100;
  }

  .order-summary {
    flex: 1;
    font-size: 0.8rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .order-summary strong {
    color: var(--accent);
    font-size: 1rem;
  }

  .send-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: #111;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    border: none;
    padding: 12px 20px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .send-btn:hover {
    background: var(--accent2);
    transform: translateY(-1px);
  }

  .send-btn:disabled {
    background: var(--border);
    color: var(--muted);
    transform: none;
    cursor: not-allowed;
  }

  .wa-icon {
    width: 20px;
    height: 20px;
  }

  .reset-btn {
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: transparent;
    color: var(--muted);
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .reset-btn:hover {
    border-color: var(--warn);
    color: var(--warn);
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }

  .modal-overlay.open {
    display: flex;
  }

  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px;
    width: 100%;
    max-width: 540px;
    border-top: 1px solid var(--border);
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 800;
    margin-bottom: 6px;
  }

  .modal-sub {
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .order-preview {
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 14px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    line-height: 1.8;
    color: var(--text);
    max-height: 220px;
    overflow-y: auto;
    margin-bottom: 16px;
    border: 1px solid var(--border);
    white-space: pre-wrap;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
  }

  .wa-send-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: var(--accent);
    color: #111;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    border: none;
    padding: 14px;
    border-radius: var(--radius);
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s;
  }

  .wa-send-btn:hover { background: var(--accent2); }

  .cancel-btn {
    padding: 14px 18px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 0.9rem;
    display: none;
  }


  .theme-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 34px;
    height: 34px;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .theme-btn:hover {
    border-color: var(--accent);
  }

  .hidden { display: none !important; }
</style>
</head>

// ─── STATE ────────────────────────────────────────────────────────────────────
let quantities = {};
let currentLang = 'fr';
let activeCategory = 'all';
let searchQuery = '';

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  renderCategoryNav();
  renderProducts();
  updateBar();
}

function renderCategoryNav() {
  const nav = document.getElementById('catNav');
  const allLabel = currentLang === 'fr' ? 'Tout' : 'All';
  let html = `<button class="cat-pill ${activeCategory === 'all' ? 'active' : ''}" onclick="setCategory('all')">${allLabel}</button>`;
  categories.forEach(cat => {
    html += `<button class="cat-pill ${activeCategory === cat.id ? 'active' : ''}" onclick="setCategory('${cat.id}')">${cat.icon} ${cat.label[currentLang]}</button>`;
  });
  nav.innerHTML = html;
}

function renderProducts() {
  const list = document.getElementById('productList');
  const q = searchQuery.toLowerCase();
  let html = '';
  let anyVisible = false;

  categories.forEach(cat => {
    if (activeCategory !== 'all' && activeCategory !== cat.id) return;

    const filtered = cat.products.filter(p => p.name.toLowerCase().includes(q));
    if (filtered.length === 0) return;
    anyVisible = true;

    html += `<div class="section" id="section-${cat.id}">`;
    html += `<div class="section-title"><span class="section-icon">${cat.icon}</span>${cat.label[currentLang]}</div>`;
    html += `<div class="product-grid">`;
    filtered.forEach(p => {
      const qty = quantities[p.id] || 0;
      html += `
        <div class="product-card ${qty > 0 ? 'has-qty' : ''}" id="card-${p.id}">
          ${qty > 0 ? `<div class="qty-badge">${qty}</div>` : ''}
          <div class="product-name">${p.name}</div>
          <div class="qty-row">
            <button class="qty-btn" onclick="changeQty('${p.id}', -1)">−</button>
            <input class="qty-input" type="number" min="0" value="${qty}" onchange="setQty('${p.id}', this.value)" id="inp-${p.id}">
            <button class="qty-btn" onclick="changeQty('${p.id}', 1)">+</button>
          </div>
        </div>`;
    });
    html += `</div></div>`;
  });

  list.innerHTML = html;
  const empty = document.getElementById('emptyState');
  empty.style.display = anyVisible ? 'none' : 'block';
}

function updateBar() {
  const total = Object.values(quantities).reduce((a, b) => a + b, 0);
  document.getElementById('totalItems').textContent = total;
  document.getElementById('cartCount').textContent = total;
  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = total === 0;

  const label = currentLang === 'fr' ? 'articles' : 'items';
  document.getElementById('summaryLabel').textContent = label + ':';
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function changeQty(id, delta) {
  const current = quantities[id] || 0;
  const newVal = Math.max(0, current + delta);
  quantities[id] = newVal;
  if (newVal === 0) delete quantities[id];
  renderProducts();
  updateBar();
}

function setQty(id, val) {
  const newVal = Math.max(0, parseInt(val) || 0);
  quantities[id] = newVal;
  if (newVal === 0) delete quantities[id];
  updateBar();
  // Update card styling without full re-render
  const card = document.getElementById(`card-${id}`);
  if (card) {
    card.className = `product-card ${newVal > 0 ? 'has-qty' : ''}`;
  }
}

function setCategory(id) {
  activeCategory = id;
  renderCategoryNav();
  renderProducts();
}

function filterProducts() {
  searchQuery = document.getElementById('searchInput').value;
  renderProducts();
}

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function resetAll() {
  if (Object.keys(quantities).length === 0) return;
  if (confirm(currentLang === 'fr' ? 'Réinitialiser toute la commande ?' : 'Reset entire order?')) {
    quantities = {};
    render();
  }
}

// ─── ORDER / MODAL ────────────────────────────────────────────────────────────
function buildMessage() {
  const today = new Date();
  const dateStr = today.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
  let msg = `Bonjour,\nLivraison pour demain matin merci 🙏\n\n`;

  categories.forEach(cat => {
    const items = cat.products.filter(p => quantities[p.id] > 0);
    if (items.length === 0) return;
    items.forEach(p => {
      msg += `${quantities[p.id]} ${p.name}\n`;
    });
  });

  msg += `\n📅 ${dateStr}`;
  return msg;
}

function openModal() {
  const msg = buildMessage();
  document.getElementById('orderPreview').textContent = msg;
  const encoded = encodeURIComponent(msg);
  document.getElementById('waLink').href = `https://wa.me/?text=${encoded}`;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
}

render();
